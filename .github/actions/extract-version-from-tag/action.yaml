name: Extract Version
description: Extracts version from VERSION file, Git tag, or manual input

inputs:
  version-file:
    default: pom.xml
    description: "Path to VERSION file (default: 'VERSION')"
    required: false
outputs:
  version:
    description: Extracted version
    value: ${{ steps.extract.outputs.version }}
runs:
  using: composite
  steps:
    - name: Extract Version
      id: extract
      shell: bash
      run: |
        # Priority order: VERSION file -> Git tag
        if [[ -f "${{ inputs.version-file }}" ]]; then
          # Check if it's a pom.xml file
          if [[ "${{ inputs.version-file }}" == *"pom.xml" ]]; then
            # Extract version from pom.xml (project version, not dependencies)
            # Get the first <version> tag which is typically the project version
            TAG=$(grep -m 1 "<version>" "${{ inputs.version-file }}" | sed 's/.*<version>\(.*\)<\/version>.*/\1/' | tr -d '\n\r' | xargs)
          else
            # Use VERSION file
            TAG=$(cat "${{ inputs.version-file }}" | tr -d '\n\r' | xargs)
          fi
          SOURCE="file"
        else
          echo "No version sources found. Using fallback generated from latest tag."
          TAG=$(git describe --tags)
          SOURCE="fallback"
        fi
        VERSION=$TAG
        # Strip the prefix if it exists
        if [[ "$VERSION" == "${{ inputs.tag-prefix }}"* ]]; then
            VERSION=${VERSION#${{ inputs.tag-prefix }}}
        fi

        echo "version=$VERSION" >> $GITHUB_OUTPUT