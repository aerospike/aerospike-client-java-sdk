name: PR CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [dev/*, stage, init]

permissions:
  contents: read
  id-token: write

concurrency:
  group: pr-ci-${{ github.workflow }}-${{ github.event.pull_request.head.sha }}
  cancel-in-progress: true

jobs:
  make-matrix:
    runs-on: ${{ vars.BUILD_CONTAINER_DISTRO_VERSION }}
    outputs:
      input-matrix: ${{ steps.create-server-matrix.outputs.input-matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - id: create-server-matrix
        uses: ./.github/actions/make-server-matrix
        with:
          default_json: ${{ vars.DEFAULT_SERVER_VERSIONS }}
          test_servers_file_path: .github/test_servers.json

  build-and-test:
    needs: make-matrix
    name: Build & Test (server ${{ matrix.server }})
    runs-on: ${{ vars.BUILD_CONTAINER_DISTRO_VERSION }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.make-matrix.outputs.input-matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract Java version from pom.xml
        id: extract_java
        run: |
          DEFAULT_VERSION=21
          VERSION=$(grep -m1 -E '<(maven.compiler.source|java.version)>' pom.xml | sed -E 's/.*>(.*)<.*/\1/')
          if [ -z "$VERSION" ]; then
            echo "Could not detect Java version, defaulting to $DEFAULT_VERSION"
            VERSION=$DEFAULT_VERSION
          fi
          echo "Detected Java version: $VERSION"
          echo "java_version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up JDK ${{ vars.JAVA_DISTRIBUTION }} ${{ steps.extract_java.outputs.java_version }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ vars.JAVA_DISTRIBUTION }}
          java-version: ${{ steps.extract_java.outputs.java_version }}
          cache: maven

      - name: Show Java & Maven
        run: |
          java -version
          mvn -v

      - name: Start Aerospike server ${{ matrix.server }}
        uses: aerospike/shared-workflows/.github/actions/setup-aerospike-server@ee86f09360c3e6f8ca302891c971d4d7716582d2
        with:
          oidc-provider: ${{ vars.OIDC_PROVIDER_NAME }}
          oidc-audience: ${{ vars.OIDC_AUDIENCE }}
          server-tag: ${{ matrix.version }}
          server-container-repo: ${{ matrix.type }}

      - name: Build & run all tests
        run: |
          mvn \
           --batch-mode \
           --no-transfer-progress \
           --update-snapshots \
           --fail-at-end \
           --errors \
           verify
        env:
          MAVEN_OPTS: ${{ vars.MAVEN_OPTS }}

      - name: Upload surefire/failsafe reports (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-jdk-${{ steps.extract_java.outputs.java_version }}-server-${{ matrix.server }}
          path: |
            **/target/surefire-reports/**
            **/target/failsafe-reports/**
          if-no-files-found: ignore
          retention-days: ${{ vars.ARTIFACT_RETENTION_DAYS }}
