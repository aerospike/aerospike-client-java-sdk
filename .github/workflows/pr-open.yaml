name: PR CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [dev/*, stage, init]

permissions:
  id-token: write
  contents: read
  actions: read  

concurrency:
  group: pr-ci-${{ github.workflow }}-${{ github.event.pull_request.head.sha }}
  cancel-in-progress: true

jobs:
  make-matrix:
    runs-on: ${{ vars.BUILD_CONTAINER_DISTRO_VERSION }}
    outputs:
      input-matrix: ${{ steps.create-server-matrix.outputs.input-matrix }}
      java-version: ${{ steps.extract-java.outputs.java_version }}
    steps:
      - uses: actions/checkout@v4

      - id: create-server-matrix
        shell: bash
        env:
          DEFAULT_JSON: ${{ vars.DEFAULT_SERVER_VERSIONS }}
          TEST_SERVERS_FILE_PATH: ${{ vars.TEST_SERVERS_FILE_PATH }}
        run: |
          set -euo pipefail

          FILE="${TEST_SERVERS_FILE_PATH:-}"

          if [[ -n "${FILE}" && -s "${FILE}" ]]; then
            echo "Using ${FILE} from repository"
            JSON="$(cat "${FILE}")"
          else
            echo "${FILE:-<unset>} missing or empty – using default_json input"
            JSON="${DEFAULT_JSON}"
          fi

          echo "${JSON}" | jq . >/dev/null

          MATRIX="$(echo "${JSON}" | jq -c '[to_entries[] | { server: .key } + .value]')"

          {
            echo "input-matrix<<__JSON__"
            echo "${MATRIX}"
            echo "__JSON__"
          } >> "$GITHUB_OUTPUT"

      - name: Extract Java version from pom.xml
        id: extract-java
        run: |
          DEFAULT_VERSION=21
          VERSION=$(grep -m1 -E '<(maven.compiler.source|java.version)>' pom.xml | sed -E 's/.*>(.*)<.*/\1/')
          if [ -z "$VERSION" ]; then
            echo "Could not detect Java version, defaulting to $DEFAULT_VERSION"
            VERSION=$DEFAULT_VERSION
          fi
          echo "Detected Java version: $VERSION"
          echo "java_version=$VERSION" >> $GITHUB_OUTPUT

  integration-test:
    name: test-${{ matrix.server }}-${{ matrix.num-nodes }}node
    needs: make-matrix
    runs-on: ${{ vars.BUILD_CONTAINER_DISTRO_VERSION }}
    strategy:
      matrix:
        include: ${{ fromJson(needs.make-matrix.outputs.input-matrix) }}
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ vars.JAVA_DISTRIBUTION }} ${{ needs.make-matrix.outputs.java-version }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ vars.JAVA_DISTRIBUTION }}
          java-version: ${{ needs.make-matrix.outputs.java-version }}
          cache: maven

      - name: Show Java & Maven
        run: |
          java -version
          mvn -v

      - name: Setup Aerospike Server (${{ matrix.num-nodes }} node)
        uses: aerospike/shared-workflows/.github/actions/setup-aerospike-server@a8ffee772c0fe60778e63f2688377becd8975b56 # CLIENT-4616
        with:
          server-tag: ${{ matrix.version }}
          server-container-repo: ${{ matrix.type }}
          num-nodes: ${{ matrix.num-nodes }}
          oidc-provider: ${{ vars.OIDC_PROVIDER_NAME }}
          oidc-audience: ${{ vars.OIDC_AUDIENCE }}
          config-content: |
            service {
                feature-key-file /etc/aerospike/features.conf
                cluster-name docker
                proto-fd-max 15000
            }

            logging {
                console {
                    context any info
                }
            }

            network {
                service {
                    address any
                    port 3000
                }
                heartbeat {
                    mode mesh
                    port 3002
                }
                fabric {
                    port 3001
                }
            }

            namespace test {
              replication-factor 1
              allow-ttl-without-nsup true
              storage-engine memory { 
                data-size 4G 
              }
            }

      - name: Build & run integration tests
        run: |
          mvn \
           --batch-mode \
           --no-transfer-progress \
           --update-snapshots \
           --fail-at-end \
           --errors \
           verify \
           -DskipTests=false
        env:
          MAVEN_OPTS: ${{ vars.MAVEN_OPTS }}

      - name: Upload surefire/failsafe reports (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.server }}-${{ matrix.num-nodes }}node-jdk-${{ needs.make-matrix.outputs.java-version }}
          path: |
            **/target/surefire-reports/**
            **/target/failsafe-reports/**
          if-no-files-found: ignore
          retention-days: ${{ vars.ARTIFACT_RETENTION_DAYS }}
