name: Build and release
# 

permissions:
  id-token: write
  packages: write
  contents: read
  attestations: write

on:
  workflow_call:
    secrets:
      GPG_SECRET_KEY:
        required: true
      GPG_PUBLIC_KEY:
        required: true
      GPG_PASS:
        required: true

jobs:
  extract-version:
    runs-on: ${{ vars.BUILD_CONTAINER_DISTRO_VERSION }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 2
      - name: Extract Version
        id: extract
        uses: ./.github/actions/get-version
    outputs:
      version: ${{ steps.extract.outputs.release-version }}

  build-packages:
    uses: aerospike/shared-workflows/.github/workflows/reusable_execute-build.yaml@7b61b675476430553f09b94419ca18802d697e98 # v3.4.0
    needs: extract-version
    with:
      gh-workflows-ref: 7b61b675476430553f09b94419ca18802d697e98 # v3.4.0
      runs-on: ${{ vars.BUILD_CONTAINER_DISTRO_VERSION }}
      jf-project: ${{ vars.JFROG_PROJECT }}
      jf-build-name: aerospike-client-java-sdk
      jf-build-id: ${{ github.run_number }}-buildinfo-${{ needs.extract-version.outputs.version }}
      gh-checkout-path: shared-workflows
      gh-source-path: aerospike-client-java-sdk
      working-directory: aerospike-client-java-sdk
      setup-java: true
      java-version: "${{ vars.JAVA_VERSION }}"
      java-distribution: ${{ vars.JAVA_DISTRIBUTION }}
      build-script: |
        mvn versions:set \
          --batch-mode \
          --no-transfer-progress \
          -DnewVersion=${{ needs.extract-version.outputs.version }} \
          -DprocessAllModules \
          -DgenerateBackupPoms=false

        cd client

        mvn \
          --batch-mode \
          --no-transfer-progress \
          --update-snapshots \
          --fail-at-end \
          --errors \
          clean source:jar javadoc:jar install \
          -DskipTests

        LOCAL_REPO=$(mvn help:evaluate -Dexpression=settings.localRepository -q -DforceStdout)
        GROUP_ID=$(mvn help:evaluate -Dexpression=project.groupId -q -DforceStdout)
        ARTIFACT_ID=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)
        VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)

        GROUP_PATH=$(echo "$GROUP_ID" | tr '.' '/')
        ARTIFACT_PATH="$LOCAL_REPO/$GROUP_PATH/$ARTIFACT_ID/$VERSION"

        # Generate .md5 and .sha1 sidecars for each primary artifact so they
        # ship as real stored files in JFrog. The shared-workflows deploy step
        # (pinned to maven-include-hashfiles-on-deploy) routes them into the
        # maven repo alongside the .jar/.pom and skips build-info entries so
        # the JFrog checksum-deploy interception accepts them and the release
        # bundle stays clean.
        for file in "$ARTIFACT_PATH"/*; do
          case "$file" in
            *.md5|*.sha1|*.sha256|*.sha512|*-jar-with-dependencies.jar|*_remote.repositories) continue ;;
          esac
          md5sum  "$file" > "$file.md5"
          sha1sum "$file" > "$file.sha1"
        done

        cd -

        echo "Copying artifacts to ./build/"
        for file in "$ARTIFACT_PATH"/*; do
          if [[ "$file" == *"-jar-with-dependencies.jar" ]] || [[ "$file" == *"_remote.repositories" ]]; then
            continue
          fi
          cp "$file" ./build/
        done

      gh-artifact-directory: build
      gh-artifact-name: build-artifacts-${{ needs.extract-version.outputs.version }}
      gh-retention-days: 1 # default
      jf-url: https://artifact.aerospike.io # default
      publish-build-info: true
      oidc-provider-name: ${{ vars.OIDC_PROVIDER_NAME }}
      oidc-audience: ${{ vars.OIDC_AUDIENCE }}

  sign-artifacts:
    needs: [build-packages, extract-version]
    uses: aerospike/shared-workflows/.github/workflows/reusable_sign-artifacts.yaml@7b61b675476430553f09b94419ca18802d697e98 # v3.4.0
    with:
      gh-workflows-ref: 7b61b675476430553f09b94419ca18802d697e98 # v3.4.0
      gh-retention-days: 1
      gh-artifact-name: signed_build-artifacts-${{ needs.extract-version.outputs.version }}
      gh-unsigned-artifacts: build-artifacts-${{ needs.extract-version.outputs.version }}
    secrets:
      gpg-private-key: ${{ secrets.GPG_SECRET_KEY }}
      gpg-public-key: ${{ secrets.GPG_PUBLIC_KEY }}
      gpg-key-pass: ${{ secrets.GPG_PASS }}

  deploy-artifacts:
    needs: [sign-artifacts, extract-version]
    uses: aerospike/shared-workflows/.github/workflows/reusable_deploy-artifacts.yaml@3015720ec043d55b09bbc158c70c21304e021ea5 # maven-include-hashfiles-on-deploy: jar+pom+md5+sha1 fix on top of v3.4.0
    with:
      gh-workflows-ref: 3015720ec043d55b09bbc158c70c21304e021ea5 # maven-include-hashfiles-on-deploy
      jf-project: ${{ vars.JFROG_PROJECT }}
      jf-build-name: aerospike-client-java-sdk
      jf-metadata-build-id: ${{ github.run_number }}-buildinfo
      jf-build-id: ${{ github.run_number }}
      gh-artifact-name: ${{ needs.sign-artifacts.outputs.gh-artifact-name }}
      version: ${{ needs.extract-version.outputs.version }}
      gh-retention-days: 1
      oidc-provider-name: ${{ vars.OIDC_PROVIDER_NAME }}
      oidc-audience: ${{ vars.OIDC_AUDIENCE }}
      dry-run: false

  create-release-bundle:
    needs: [extract-version, deploy-artifacts]
    uses: aerospike/shared-workflows/.github/workflows/reusable_create-release-bundle.yaml@7b61b675476430553f09b94419ca18802d697e98 # v3.4.0
    with:
      gh-workflows-ref: 7b61b675476430553f09b94419ca18802d697e98 # v3.4.0
      jf-project: ${{ vars.JFROG_PROJECT }}
      jf-build-names: aerospike-client-java-sdk:${{ github.run_number }}
      jf-bundle-name: aerospike-client-java-sdk
      version: ${{ needs.extract-version.outputs.version }}
      oidc-provider-name: ${{ vars.OIDC_PROVIDER_NAME }}
      oidc-audience: ${{ vars.OIDC_AUDIENCE }}
      dry-run: false

  promote-release-bundle:
    needs: [extract-version, create-release-bundle]
    runs-on: ${{ vars.BUILD_CONTAINER_DISTRO_VERSION }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Setup JFrog CLI
        uses: step-security/setup-jfrog-cli@893a92f96c7727242adf0e603c77b1f2a22390e1 # v4.9.1
        env:
          JF_URL: https://artifact.aerospike.io
          JF_PROJECT: ${{ vars.JFROG_PROJECT }}
        with:
          oidc-provider-name: ${{ vars.OIDC_PROVIDER_NAME }}
          oidc-audience: ${{ vars.OIDC_AUDIENCE }}
      - name: Promote release bundle to DEV
        uses: aerospike/shared-workflows/.github/actions/promote-release-bundle@7b61b675476430553f09b94419ca18802d697e98 # v3.4.0
        with:
          bundle-name: aerospike-client-java-sdk
          version: ${{ needs.extract-version.outputs.version }}
          environment: DEV
          jf-project: ${{ vars.JFROG_PROJECT }}
